<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Primary Didactics Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
      .hub-layout {
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 24px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .hub-tabs {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .hub-tab {
        padding: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: white;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.1rem;
      }
      .hub-tab:hover, .hub-tab.active {
        background: rgba(255, 77, 109, 0.2);
        border-color: var(--cyan);
        transform: translateX(5px);
      }
      .hub-content {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 40px;
        min-height: 60vh;
      }
      .content-page {
        margin-bottom: 40px;
      }
      .content-page h3 {
        color: var(--cyan);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .content-page p {
        color: var(--muted);
        line-height: 1.7;
        font-size: 1.05rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <nav class="topbar" style="padding: 20px;">
      <a class="brand" href="../../index.html">
        <span class="brand__glyph">VT2</span>
        <span>Lab</span>
      </a>
    </nav>
    <main class="hub-layout">
      <aside class="hub-tabs">
        <button class="hub-tab active" data-target="Methodology">Methodology & Activities</button>
        <button class="hub-tab" data-target="Programming">Didactic Programming</button>
      </aside>
      <section class="hub-content" id="contentArea">
        <h2>Select a module to begin reading</h2>
      </section>
    </main>
    <script src="../../data/pdf_content.js"></script>
    <script>
      const dataMapping = {
        "Methodology": pdfData["Metodologia_Todo"] || [],
        "Programming": pdfData["Programacion_Didactica"] || []
      };

      const contentArea = document.getElementById("contentArea");
      const tabs = document.querySelectorAll(".hub-tab");

      function loadContent(key) {
        const pages = dataMapping[key];
        contentArea.innerHTML = \`<h2>\${key}</h2>\`;
        
        if (pages.length === 0) {
           contentArea.innerHTML += "<p>No data extracted for this module.</p>";
           return;
        }

        pages.forEach(page => {
           const div = document.createElement("div");
           div.className = "content-page";
           div.innerHTML = \`
             <h3>Page \${page.page}</h3>
             <p>\${page.text}</p>
           \`;
           contentArea.appendChild(div);
        });
      }

      tabs.forEach(tab => {
        tab.addEventListener("click", () => {
          tabs.forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          loadContent(tab.dataset.target);
        });
      });

      // Load initial
      loadContent("Methodology");
    </script>
  </body>
</html>
