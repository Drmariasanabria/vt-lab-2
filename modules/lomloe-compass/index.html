<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LOMLOE Activity Compass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
      .compass-layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 24px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .compass-sidebar {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px;
        position: sticky;
        top: 20px;
        height: max-content;
      }
      .compass-search {
        width: 100%;
        padding: 12px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: white;
        margin-bottom: 20px;
      }
      .compass-toc {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 60vh;
        overflow-y: auto;
      }
      .compass-toc li {
        margin-bottom: 8px;
      }
      .compass-toc a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.95rem;
        display: block;
        padding: 8px;
        border-radius: 6px;
        transition: background 0.2s;
      }
      .compass-toc a:hover, .compass-toc a.active {
        background: rgba(255, 255, 255, 0.1);
        color: var(--cyan);
      }
      .compass-content {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 40px;
        min-height: 60vh;
      }
      .chunk-card {
        margin-bottom: 24px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        border-left: 4px solid var(--cyan);
      }
      .chunk-card h3 {
        font-size: 1.2rem;
        margin-bottom: 12px;
        color: white;
      }
      .chunk-card p {
        color: var(--muted);
        line-height: 1.6;
        white-space: pre-wrap;
      }
      .highlight {
        background: rgba(255, 77, 109, 0.3);
        color: white;
        padding: 0 4px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <nav class="topbar" style="padding: 20px;">
      <a class="brand" href="../../index.html">
        <span class="brand__glyph">VT2</span>
        <span>Lab</span>
      </a>
    </nav>
    <main class="compass-layout">
      <aside class="compass-sidebar">
        <h2 style="font-size: 1.5rem; margin-bottom: 16px;">LOMLOE Bachillerato</h2>
        <input type="text" class="compass-search" id="searchInput" placeholder="Search competencies, criteria...">
        <ul class="compass-toc" id="tocList">
          <!-- Populated by JS -->
        </ul>
      </aside>
      <section class="compass-content" id="contentArea">
        <h2>Welcome to the LOMLOE Compass</h2>
        <p>Select a section from the left or use the search bar to find specific competencies and evaluation criteria from the Bachillerato curriculum.</p>
      </section>
    </main>
    <script src="../../data/pdf_content.js"></script>
    <script>
      const lomloeData = pdfData["LOMLOE_Bachillerato"] || [];
      const tocList = document.getElementById("tocList");
      const contentArea = document.getElementById("contentArea");
      const searchInput = document.getElementById("searchInput");

      // Generate TOC
      function renderTOC() {
        tocList.innerHTML = "";
        // We'll create chunks of 5 pages for the TOC
        for(let i=0; i<lomloeData.length; i+=3) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = "#";
          a.textContent = \`Section \${i+1} to \${Math.min(i+3, lomloeData.length)}\`;
          a.onclick = (e) => {
            e.preventDefault();
            document.querySelectorAll('.compass-toc a').forEach(el => el.classList.remove('active'));
            a.classList.add('active');
            renderContent(i, i+3);
          };
          li.appendChild(a);
          tocList.appendChild(li);
        }
      }

      function renderContent(start, end, highlightText = "") {
        contentArea.innerHTML = "";
        const chunks = lomloeData.slice(start, end);
        chunks.forEach((chunk, index) => {
          const card = document.createElement("div");
          card.className = "chunk-card";
          let text = chunk.text;
          
          if (highlightText) {
            const regex = new RegExp(\`(\${highlightText})\`, "gi");
            text = text.replace(regex, '<span class="highlight">$1</span>');
          }

          card.innerHTML = \`
            <h3>Page \${chunk.page}</h3>
            <p>\${text}</p>
          \`;
          contentArea.appendChild(card);
        });
      }

      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        if (query.length < 3) {
          if (query.length === 0) {
             contentArea.innerHTML = "<h2>Welcome to the LOMLOE Compass</h2><p>Select a section from the left or use the search bar to find specific competencies.</p>";
          }
          return;
        }

        contentArea.innerHTML = "<h2>Search Results</h2>";
        const results = lomloeData.filter(chunk => chunk.text.toLowerCase().includes(query));
        
        if (results.length === 0) {
          contentArea.innerHTML += "<p>No results found.</p>";
          return;
        }

        results.forEach(chunk => {
          const card = document.createElement("div");
          card.className = "chunk-card";
          let text = chunk.text;
          const regex = new RegExp(\`(\${query})\`, "gi");
          text = text.replace(regex, '<span class="highlight">$1</span>');
          card.innerHTML = \`
            <h3>Page \${chunk.page}</h3>
            <p>\${text}</p>
          \`;
          contentArea.appendChild(card);
        });
      });

      renderTOC();
    </script>
  </body>
</html>
